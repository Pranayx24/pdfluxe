<!DOCTYPE html>
<html>
<head>
    <title>Test PDF Encrypt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
    <h1>PDF Encrypt Test</h1>
    <input type="file" id="fileInput">
    <input type="text" id="password" value="1234">
    <button id="btn">Encrypt & Download</button>

    <script type="module">
        const ENCRYPT_LIB_URL = 'https://cdn.jsdelivr.net/npm/@pdfsmaller/pdf-encrypt-lite/+esm';
        
        document.getElementById('btn').onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            const password = document.getElementById('password').value;
            if (!file) return alert('Select file');

            try {
                console.log("Loading library...");
                const mod = await import(ENCRYPT_LIB_URL);
                console.log("Library loaded:", mod);
                const encryptPDF = mod.encryptPDF || (mod.default && mod.default.encryptPDF) || mod.default;
                
                const arrayBuffer = await file.arrayBuffer();
                const pdfBytes = new Uint8Array(arrayBuffer);
                
                console.log("Encrypting...");
                const protectedPdfBytes = await encryptPDF(pdfBytes, password, password);
                
                console.log("Encryption done. Size:", protectedPdfBytes.length);
                
                const blob = new Blob([protectedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'protected.pdf';
                a.click();
                alert("Downloaded! Please check if it asks for password '1234'");
            } catch (e) {
                console.error(e);
                alert("Error: " + e.message);
            }
        };
    </script>
</body>
</html>
