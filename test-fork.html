<!DOCTYPE html>
<html>
<head>
    <title>Test PDF Encrypt with Fork</title>
    <!-- Use the fork with encryption support -->
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib-with-encrypt@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <h1>PDF Encrypt Test (Fork)</h1>
    <div id="status">Testing encryption...</div>
    <div id="result"></div>
    
    <script>
        async function run() {
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            try {
                const { PDFDocument, rgb } = window.PDFLib;
                if (!PDFDocument) throw new Error("PDFDocument not found in PDFLib");

                // 1. Create a PDF
                status.innerText = "Creating a test PDF...";
                const pdfDoc = await PDFDocument.create();
                const page = pdfDoc.addPage([500, 500]);
                page.drawText('This is a protected PDF using a fork!', { x: 50, y: 400, size: 24, color: rgb(0, 0, 0.5) });
                
                // 2. Encrypt it using the new API
                status.innerText += " Encrypting with password '1234'...";
                if (typeof pdfDoc.encrypt !== 'function') {
                    throw new Error("doc.encrypt is NOT a function. This version of pdf-lib does not support encryption.");
                }

                await pdfDoc.encrypt({
                    userPassword: '1234',
                    ownerPassword: 'admin',
                    permissions: {
                        printing: 'highResolution',
                        modifying: false,
                        copying: true,
                        annotating: true,
                        fillingForms: true,
                        contentAccessibility: true,
                        documentAssembly: true
                    }
                });
                
                const protectedBytes = await pdfDoc.save();
                status.innerText += ` Encryption done. Protected size: ${protectedBytes.length} bytes.`;

                // 3. Try to Load it back with pdf-lib (it should fail if not provided password)
                try {
                    await PDFDocument.load(protectedBytes);
                    status.innerText += " FAILURE: PDF loaded WITHOUT password! Encryption didn't work.";
                    result.innerHTML = `<span style="color: red;">✘ Encryption FAILED! The output PDF is not encrypted.</span>`;
                } catch (e) {
                    status.innerText += " SUCCESS: PDF could NOT be loaded without password (as expected).";
                    
                    // 4. Try to load with RIGHT password
                    try {
                        const loadedDoc = await PDFDocument.load(protectedBytes, { password: '1234' });
                        status.innerText += " SUCCESS: PDF loaded with right password!";
                        result.innerHTML = `<span style="color: green;">✔ Encryption works!</span>`;
                    } catch (e2) {
                        status.innerText += ` FAILURE: PDF could NOT be loaded even with right password: ${e2.message}`;
                        result.innerHTML = `<span style="color: red;">✘ Decryption FAILED: ${e2.message}</span>`;
                    }
                }

            } catch (e) {
                console.error(e);
                status.innerText += " ERROR: " + e.message;
                result.innerHTML = `<span style="color: red;">ERROR: ${e.message}</span>`;
            }
        }
        
        run();
    </script>
</body>
</html>
