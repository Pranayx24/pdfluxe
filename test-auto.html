<!DOCTYPE html>
<html>
<head>
    <title>Test PDF Encrypt Automatic</title>
</head>
<body>
    <h1>PDF Encrypt Test</h1>
    <div id="status">Loading libraries...</div>
    <div id="result"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script type="module">
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const ENCRYPT_LIB_URL = 'https://cdn.jsdelivr.net/npm/@pdfsmaller/pdf-encrypt-lite/+esm';
        const DECRYPT_LIB_URL = 'https://cdn.jsdelivr.net/npm/@pdfsmaller/pdf-decrypt-lite/+esm';

        async function run() {
            try {
                // 1. Create a PDF
                status.innerText = "Creating a test PDF...";
                const { PDFDocument, rgb } = window.PDFLib;
                const pdfDoc = await PDFDocument.create();
                const page = pdfDoc.addPage([500, 500]);
                page.drawText('This is a protected PDF!', { x: 50, y: 400, size: 24, color: rgb(0, 0, 0.5) });
                const originalBytes = await pdfDoc.save();
                status.innerText = `Original PDF created. Size: ${originalBytes.length} bytes.`;

                // 2. Load encryption library
                status.innerText += " Loading encryption library...";
                const mod = await import(ENCRYPT_LIB_URL);
                const encryptPDF = mod.encryptPDF || (mod.default && mod.default.encryptPDF) || mod.default;
                
                // 3. Encrypt it
                status.innerText += " Encrypting with password '1234'...";
                const protectedBytes = await encryptPDF(originalBytes, '1234', 'admin');
                status.innerText += ` Encryption done. Protected size: ${protectedBytes.length} bytes.`;

                // 4. Verify with decryption library
                status.innerText += " Loading decryption library and checking...";
                const decMod = await import(DECRYPT_LIB_URL);
                const isEncrypted = decMod.isEncrypted || (decMod.default && decMod.default.isEncrypted);
                
                const info = await isEncrypted(protectedBytes);
                if (info && info.encrypted) {
                    status.innerText += " SUCCESS: Result is encrypted!";
                    result.innerHTML = `<span style="color: green;">✔ Encryption works!</span>`;

                    // 5. Try to decrypt with wrong password
                    const decryptPDF = decMod.decryptPDF || (decMod.default && decMod.default.decryptPDF);
                    try {
                        await decryptPDF(protectedBytes, 'wrong');
                        result.innerHTML += `<br><span style="color: red;">✘ Decryption with wrong password should fail!</span>`;
                    } catch(e) {
                         result.innerHTML += `<br><span style="color: green;">✔ Decryption with wrong password failed as expected.</span>`;
                    }

                    // 6. Try to decrypt with right password
                    try {
                        const decryptedBytes = await decryptPDF(protectedBytes, '1234');
                        result.innerHTML += `<br><span style="color: green;">✔ Decryption with right password succeeded!</span>`;
                        
                        // 7. Verify decrypted content
                        const decodedDoc = await PDFDocument.load(decryptedBytes);
                         result.innerHTML += `<br><span style="color: green;">✔ Decrypted PDF loaded by pdf-lib. Pages: ${decodedDoc.getPageCount()}</span>`;
                    } catch(e) {
                        result.innerHTML += `<br><span style="color: red;">✘ Decryption with right password failed: ${e.message}</span>`;
                    }

                } else {
                    status.innerText += " FAILURE: Result is NOT encrypted.";
                    result.innerHTML = `<span style="color: red;">✘ Encryption FAILED! The output PDF is not encrypted.</span>`;
                }

            } catch (e) {
                console.error(e);
                status.innerText += " ERROR: " + e.message;
                result.innerHTML = `<span style="color: red;">ERROR: ${e.message}</span>`;
            }
        }
        
        run();
    </script>
</body>
</html>
